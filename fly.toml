app = "thrifty-api"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_BASE_URL = "https://thrifty.app"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
